<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Search</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#f5f7fa;
        }

        .logo{
            max-width:350px;
        }

        .book-cover{
            height:320px;
            object-fit:cover;
        }

        .card{
            border:none;
            transition:.3s;
            box-shadow:0 3px 10px rgba(0,0,0,.1);
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card-title{
            min-height:70px;
            font-size:18px;
            font-weight:600;
        }

        .search-box{
            background:white;
            border-radius:15px;
            padding:25px;
            box-shadow:0 3px 10px rgba(0,0,0,.1);
        }

    </style>

</head>
<body>

<div class="container py-4">

    <!-- Logo -->
    <div class="text-center mb-4">
        <img
            src="img/book-edu.png"
            alt="Book Education"
            class="logo img-fluid"
        >
    </div>

    <!-- Search Area -->
    <div class="search-box mb-4">

        <div class="mb-3">

            <input
                type="text"
                id="keyword"
                class="form-control form-control-lg"
                placeholder="Cari buku..."
            >

        </div>

        <div class="row">

            <div class="col-md-3 mb-2">

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="filter"
                        id="title"
                        value="title"
                        checked
                    >

                    <label class="form-check-label" for="title">
                        Title
                    </label>
                </div>

            </div>

            <div class="col-md-3 mb-2">

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="filter"
                        id="author"
                        value="author"
                    >

                    <label class="form-check-label" for="author">
                        Author
                    </label>
                </div>

            </div>

            <div class="col-md-3 mb-2">

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="filter"
                        id="publisher"
                        value="publisher"
                    >

                    <label class="form-check-label" for="publisher">
                        Publisher
                    </label>
                </div>

            </div>

            <div class="col-md-3 mb-2">

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="filter"
                        id="titleYear"
                        value="titleYear"
                    >

                    <label class="form-check-label" for="titleYear">
                        Title + Year
                    </label>
                </div>

            </div>

        </div>

        <div class="mt-3">

            <input
                type="number"
                id="yearInput"
                class="form-control"
                placeholder="Masukkan Tahun"
            >

        </div>

    </div>

    <!-- Data Buku -->
    <div
        class="row"
        id="bookContainer">
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
```
